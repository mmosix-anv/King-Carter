# /etc/nginx/sites-available/booking-proxy
# Symlink: sudo ln -s /etc/nginx/sites-available/booking-proxy /etc/nginx/sites-enabled/
# Then:    sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (replace with your cert paths, or use Certbot) ────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Proxy the /booking route to Node.js ───────────────────────
    location /booking {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Remove headers that break iframe embedding
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;

        # Allow this page to be embedded in an iframe on YOUR domain only
        add_header X-Frame-Options          "SAMEORIGIN" always;
        add_header Content-Security-Policy  "frame-ancestors 'self' yourdomain.com" always;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    # ── Proxy the /login route to Node.js ─────────────────────────
    location /login {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;

        add_header X-Frame-Options          "SAMEORIGIN" always;
        add_header Content-Security-Policy  "frame-ancestors 'self' yourdomain.com" always;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    # ── Health check (optional — useful for uptime monitors) ──────
    location /health {
        proxy_pass http://127.0.0.1:3002;
        access_log off;
    }

    # ── Cache-bust endpoint (POST only) ───────────────────────────
    location /booking/refresh {
        proxy_pass http://127.0.0.1:3002;
        limit_except POST { deny all; }
    }

    # ── Block direct access to .env / config files ────────────────
    location ~ /\.(env|git|config) {
        deny all;
    }

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
